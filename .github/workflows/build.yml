name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pillow pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "HeadshotProcessor" headshot.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeadshotProcessor-Windows
          path: dist/HeadshotProcessor.exe
